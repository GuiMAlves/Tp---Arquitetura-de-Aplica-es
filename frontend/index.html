<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allianza Veículos Estoque</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Allianza Veículos Estoque</h1>
      <nav class="header-nav" id="header-nav">
        <a href="#" data-view="marcas">Marcas</a>
        <a href="#" data-view="modelos">Modelos</a>
        <a href="#" id="logout-btn" style="display:none;">Sair</a>
      </nav>
    </div>
  </header>
  <main id="app"></main>
  <template id="home-template">
    <section>
      <h2>Bem-vindo à Allianza Auto</h2>
      <p>Gerencie o estoque de veículos: cadastre marcas e modelos, consulte informações e mantenha o inventário atualizado.</p>
      <div id="auth-buttons">
        <button id="login-btn">Login</button>
        <button id="registro-btn">Registrar</button>
      </div>
      <div id="logged-buttons" style="display:none;">
        <button id="enter-marcas">Ir para Marcas</button>
        <button id="enter-modelos">Ir para Modelos</button>
      </div>
    </section>
  </template>

  <template id="marcas-template">
    <section>
      <h2>Marcas</h2>
      <div class="header-buttons">
        <button id="new-marca">Nova Marca</button>
        <button id="back-marcas">Voltar</button>
      </div>
      <div class="table-container">
        <table id="marcas-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Logo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="marcas-list"></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="modelos-template">
    <section>
      <h2>Modelos</h2>
      <div class="header-buttons">
        <button id="new-modelo">Novo Modelo</button>
        <button id="back-modelos">Voltar</button>
      </div>
      <div class="table-container">
        <table id="modelos-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Marca</th>
              <th>Ano Fabricação</th>
              <th>Ano Modelo</th>
              <th>Carroceria</th>
              <th>Kilometragem</th>
              <th>Combustível</th>
              <th>Cor</th>
              <th>Câmbio</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="modelos-list"></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="marca-form-template">
    <section>
      <h2 id="marca-form-title">Marca</h2>
      <form id="marca-form">
        <label>Nome<input name="nome" required /></label>
        <label>Logo (arquivo)
          <input id="logo-file" type="file" accept="image/*" />
        </label>
        <input type="hidden" name="logo" />
        <div id="logo-preview"><img id="logo-img" src="" alt="logo" width="40" height="40" style="display:none"/></div>
        <div class="form-buttons">
          <button type="submit">Salvar</button>
          <button type="button" id="marca-cancel">Cancelar</button>
        </div>
      </form>
      <div id="marca-message"></div>
    </section>
  </template>

  <template id="modelo-form-template">
    <section>
      <h2 id="modelo-form-title">Modelo</h2>
      <form id="modelo-form">
        <label>Nome<input name="nome" required /></label>
        <label>Ano de Fabricação<input name="anoFabricacao" type="number" required /></label>
        <label>Ano do Modelo<input name="anoModelo" type="number" required /></label>
        <label>Carroceria
          <select name="carroceria" required>
            <option value="Hatch">Hatch</option>
            <option value="SUV">SUV</option>
            <option value="Pickup">Pickup</option>
            <option value="Caminhonete">Caminhonete</option>
            <option value="Esportivo">Esportivo</option>
          </select>
        </label>
        <label>Kilometragem<input name="kilometragem" type="number" min="0" required /></label>
        <label>Combustível
          <select name="combustivel" required>
            <option value="Gasolina">Gasolina</option>
            <option value="Álcool">Álcool</option>
            <option value="Flex">Flex</option>
            <option value="Elétrico">Elétrico</option>
          </select>
        </label>
        <label>Cor<input name="cor" required /></label>
        <label>Câmbio
          <select name="cambio" required>
            <option value="Automático">Automático</option>
            <option value="Manual">Manual</option>
          </select>
        </label>
        <label>Marca<select name="marca" required></select></label>
        <div class="form-buttons">
          <button type="submit">Salvar</button>
          <button type="button" id="modelo-cancel">Cancelar</button>
        </div>
      </form>
      <div id="modelo-message"></div>
    </section>
  </template>

  <template id="login-template">
    <section>
      <h2>Login</h2>
      <form id="login-form">
        <label>Email<input name="email" type="email" required /></label>
        <label>Senha<input name="senha" type="password" required /></label>
        <div class="form-buttons">
          <button type="submit">Entrar</button>
          <button type="button" id="back-login">Voltar</button>
        </div>
      </form>
      <div id="login-message"></div>
    </section>
  </template>

  <template id="registro-template">
    <section>
      <h2>Registrar</h2>
      <form id="registro-form">
        <label>Nome<input name="nome" required /></label>
        <label>Email<input name="email" type="email" required /></label>
        <label>Senha<input name="senha" type="password" required /></label>
        <label>Confirmar Senha<input name="confirmaSenha" type="password" required /></label>
        <div class="form-buttons">
          <button type="submit">Registrar</button>
          <button type="button" id="back-registro">Voltar</button>
        </div>
      </form>
      <div id="registro-message"></div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
